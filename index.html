<script>
  // iOS home-screen web apps aggressively cache pages. Fetch a small version
  // marker with no-store so this check always hits the network; if it doesn't
  // match what we last saw, force a real reload to pick up the new deploy.
  (function checkForUpdate() {
    fetch('version.txt?t=' + Date.now(), { cache: 'no-store' })
      .then((r) => r.text())
      .then((v) => {
        v = v.trim();
        if (!v) return;
        const stored = localStorage.getItem('app-version');
        localStorage.setItem('app-version', v);
        if (stored && stored !== v) location.reload();
      })
      .catch(() => {});
  })();
</script>

    color: var(--text-muted);

  .selection-bar {

  .selection-bar-top {

    font-size: 13px;

  @media (prefers-reduced-motion: no-preference) {
    .fab, .icon-btn, .btn { transition: transform 0.12s ease, background-color 0.12s ease; }
  }

<div class="app">

      <button class="sync-btn" id="importBtn" type="button" aria-label="가져오기">⬇</button>
      <button class="sync-btn" id="selectModeBtn" type="button" aria-label="선택 삭제">🗑</button>

      <button class="cal-nav-btn" id="calPrevBtn" type="button" aria-label="이전 달">‹</button>

      <button class="cal-nav-btn" id="calNextBtn" type="button" aria-label="다음 달">›</button>

    <div class="calendar-picker" id="calendarPicker">
      <select class="cal-select" id="calYearSelect"></select>

    <div class="calendar-grid" id="calendarGrid"></div>

</div>

<button class="fab" id="fabAdd" aria-label="기록 추가">+</button>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyD1ihTSkJ8af3OZpg8b3KHK1gQ61iUqolA",
    authDomain: "fitness-tracking-44f4f.firebaseapp.com",
    projectId: "fitness-tracking-44f4f",
    storageBucket: "fitness-tracking-44f4f.firebasestorage.app",
    messagingSenderId: "485485802188",
    appId: "1:485485802188:web:fba4d0e7a2fb2708798869"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  db.settings({ experimentalAutoDetectLongPolling: true });

  const STORAGE_KEY = 'workout-days';
  const SYNC_KEY = 'workout-sync-code';
  const CODE_CHARS = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
  const WEEKDAYS_KO = ['일', '월', '화', '수', '목', '금', '토'];

  function uid() {
    return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
  }

  function todayISO() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function formatDateShort(iso) {
    const d = new Date(iso + 'T00:00:00');
    const yy = d.getFullYear() % 100;
    const m = d.getMonth() + 1;
    const day = d.getDate();
    return { label: `${yy}/${m}/${day}`, weekday: WEEKDAYS_KO[d.getDay()] };
  }

  function parseDateInput(input) {
    const trimmed = (input || '').trim();
    let m = trimmed.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if (m) return `${m[1]}-${m[2].padStart(2, '0')}-${m[3].padStart(2, '0')}`;
    m = trimmed.match(/^(\d{2,4})\/(\d{1,2})\/(\d{1,2})$/);
    if (m) {
      const year = m[1].length <= 2 ? 2000 + parseInt(m[1], 10) : parseInt(m[1], 10);
      return `${year}-${m[2].padStart(2, '0')}-${m[3].padStart(2, '0')}`;
    }
    return todayISO();
  }

  function parseNotepadImport(text) {
    const lines = text.split(/\r?\n/);
    const result = [];
    let currentDay = null;
    let currentExercise = null;
    let currentYear = null;

    // A date token must be followed by end-of-line, whitespace, or Korean text (weekday/note) —
    // never another digit or "/", so wrapped rep-scheme lines like "12/12/12,12/12/..." aren't
    // mistaken for a date.
    const dateBoundary = '(?=$|\\s|[가-힣])';
    const yearRe = /^(\d{4})년$/;
    const fullDateRe = new RegExp(`^(\\d{2,4})\\/(\\d{1,2})\\/(\\d{1,2})(?:\\s*[일월화수목금토])?${dateBoundary}`);
    const shortDateRe = new RegExp(`^(\\d{1,2})\\/(\\d{1,2})(?:\\s*[일월화수목금토])?${dateBoundary}`);

    for (const rawLine of lines) {
      const line = rawLine.trim();
      if (!line) continue;
      if (/^[ㅡ\-_=]{5,}$/.test(line)) continue;

      const yearMatch = line.match(yearRe);
      if (yearMatch) {
        currentYear = parseInt(yearMatch[1], 10);
        continue;
      }

      const fullDateMatch = line.match(fullDateRe);
      if (fullDateMatch) {
        if (currentDay && currentDay.exercises.length) result.push(currentDay);
        currentDay = { id: uid(), date: parseDateInput(`${fullDateMatch[1]}/${fullDateMatch[2]}/${fullDateMatch[3]}`), exercises: [] };
        currentExercise = null;
        continue;
      }

      const shortDateMatch = line.match(shortDateRe);
      if (shortDateMatch && currentYear) {
        if (currentDay && currentDay.exercises.length) result.push(currentDay);
        const mm = shortDateMatch[1].padStart(2, '0');
        const dd = shortDateMatch[2].padStart(2, '0');
        currentDay = { id: uid(), date: `${currentYear}-${mm}-${dd}`, exercises: [] };
        currentExercise = null;
        continue;
      }

      if (!currentDay) continue;

      const exMatch = line.match(/^\d+\.\s*(.+)$/);
      if (exMatch) {
        currentExercise = { id: uid(), name: exMatch[1].trim(), warmup: '', main: '' };
        currentDay.exercises.push(currentExercise);
        continue;
      }
      if (!currentExercise) continue;

      const warmupMatch = line.match(/^웜업\s*-\s*(.*)$/);
      if (warmupMatch) {
        currentExercise.warmup = warmupMatch[1].trim();
        continue;
      }
      const mainMatch = line.match(/^본셋\s*-\s*(.*)$/);
      if (mainMatch) {
        currentExercise.main = mainMatch[1].trim();
        continue;
      }
    }
    if (currentDay && currentDay.exercises.length) result.push(currentDay);
    return result;
  }

  function loadDays() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function saveDays(days) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(days));
  }

  function randomSyncCode(len = 10) {
    const arr = new Uint32Array(len);
    crypto.getRandomValues(arr);
    let s = '';
    for (let i = 0; i < len; i++) s += CODE_CHARS[arr[i] % CODE_CHARS.length];
    return s;
  }

  function getSyncCode() {
    let code = localStorage.getItem(SYNC_KEY);
    if (!code) {
      code = randomSyncCode();
      localStorage.setItem(SYNC_KEY, code);
    }
    return code;
  }

  let days = loadDays();
  let editingDayId = null;
  let syncCode = getSyncCode();
  let unsubscribeSync = null;
  let applyingRemote = false;

  const listRoot = document.getElementById('listRoot');
  const dayCountEl = document.getElementById('dayCount');
  const yearTabsEl = document.getElementById('yearTabs');
  const searchInput = document.getElementById('searchInput');
  const searchClearBtn = document.getElementById('searchClearBtn');
  const sortToggleBtn = document.getElementById('sortToggleBtn');
  let activeYearFilter = 'all';
  let searchQuery = '';
  let sortAscending = false;

  function updateSearchClearBtn() {
    searchClearBtn.classList.toggle('visible', searchInput.value.length > 0);
  }

  searchInput.addEventListener('input', () => {
    searchQuery = searchInput.value.trim();
    updateSearchClearBtn();
    render();
  });

  searchClearBtn.addEventListener('click', () => {
    searchInput.value = '';
    searchQuery = '';
    updateSearchClearBtn();
    searchInput.focus();
    render();
  });

  sortToggleBtn.addEventListener('click', () => {
    sortAscending = !sortAscending;
    sortToggleBtn.textContent = sortAscending ? '오래된순' : '최신순';
    render();
  });

  // Mouse wheel scrolls the year tabs horizontally on desktop (touch swipe already works).
  yearTabsEl.addEventListener('wheel', (e) => {
    if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
      e.preventDefault();
      yearTabsEl.scrollLeft += e.deltaY;
    }
  }, { passive: false });
  const overlay = document.getElementById('overlay');
  const sheetTitle = document.getElementById('sheetTitle');
  const dateInput = document.getElementById('dateInput');
  const exerciseRows = document.getElementById('exerciseRows');
  const importBtn = document.getElementById('importBtn');
  const importOverlay = document.getElementById('importOverlay');
  const importTextarea = document.getElementById('importTextarea');
  const importStatus = document.getElementById('importStatus');
  const importCloseBtn = document.getElementById('importCloseBtn');
  const importConfirmBtn = document.getElementById('importConfirmBtn');
  const syncBtn = document.getElementById('syncBtn');
  const syncOverlay = document.getElementById('syncOverlay');
  const syncCodeDisplay = document.getElementById('syncCodeDisplay');
  const copyCodeBtn = document.getElementById('copyCodeBtn');
  const joinCodeInput = document.getElementById('joinCodeInput');
  const joinCodeBtn = document.getElementById('joinCodeBtn');
  const syncCloseBtn = document.getElementById('syncCloseBtn');
  const syncStatus = document.getElementById('syncStatus');
  const fabAdd = document.getElementById('fabAdd');
  const selectModeBtn = document.getElementById('selectModeBtn');
  const selectionBar = document.getElementById('selectionBar');
  const selectionCount = document.getElementById('selectionCount');
  const selectCancelBtn = document.getElementById('selectCancelBtn');
  const selectAllBtn = document.getElementById('selectAllBtn');
  const deleteAllBtn = document.getElementById('deleteAllBtn');
  const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
  const confirmOverlay = document.getElementById('confirmOverlay');
  const confirmTitle = document.getElementById('confirmTitle');
  const confirmMessage = document.getElementById('confirmMessage');
  const confirmCancelBtn = document.getElementById('confirmCancelBtn');
  const confirmOkBtn = document.getElementById('confirmOkBtn');
  const toolbarRow = document.getElementById('toolbarRow');
  const calendarToggleBtn = document.getElementById('calendarToggleBtn');
  const calendarView = document.getElementById('calendarView');
  const calendarLabel = document.getElementById('calendarLabel');
  const calendarGrid = document.getElementById('calendarGrid');
  const calPrevBtn = document.getElementById('calPrevBtn');
  const calNextBtn = document.getElementById('calNextBtn');
  const calendarPicker = document.getElementById('calendarPicker');
  const calYearSelect = document.getElementById('calYearSelect');
  const calMonthSelect = document.getElementById('calMonthSelect');

  let viewMode = 'list';
  let calendarYear = null;
  let calendarMonth = null;

  function refreshCurrentView() {
    if (viewMode === 'calendar') renderCalendar();
    else render();
  }

  function ensureCalendarPosition() {
    if (calendarYear !== null) return;
    if (days.length > 0) {
      const latest = [...days].sort((a, b) => (a.date < b.date ? 1 : -1))[0];
      const [y, m] = latest.date.split('-').map(Number);
      calendarYear = y;
      calendarMonth = m;
    } else {
      const now = new Date();
      calendarYear = now.getFullYear();
      calendarMonth = now.getMonth() + 1;
    }
  }

  function setViewMode(mode) {
    viewMode = mode;
    const isCalendar = mode === 'calendar';
    toolbarRow.style.display = isCalendar ? 'none' : '';
    yearTabsEl.style.display = isCalendar ? 'none' : '';
    listRoot.style.display = isCalendar ? 'none' : '';
    calendarView.classList.toggle('open', isCalendar);
    calendarToggleBtn.textContent = isCalendar ? '📋' : '📅';
    calendarToggleBtn.setAttribute('aria-label', isCalendar ? '목록 보기' : '달력 보기');
    closeCalendarPicker();
    if (isCalendar) {
      // Always land on the real current month when (re-)entering the calendar.
      const now = new Date();
      calendarYear = now.getFullYear();
      calendarMonth = now.getMonth() + 1;
      renderCalendar();
    } else {
      render();
    }
  }

  calendarToggleBtn.addEventListener('click', () => {
    setViewMode(viewMode === 'calendar' ? 'list' : 'calendar');
  });

  function closeCalendarPicker() {
    calendarPicker.classList.remove('open');
  }

  function populateCalendarPickerOptions() {
    const nowYear = new Date().getFullYear();
    const dataYears = days.map((d) => parseInt(d.date.slice(0, 4), 10));
    const minYear = Math.min(nowYear - 5, ...(dataYears.length ? dataYears : [nowYear]));
    const maxYear = nowYear + 1;

    calYearSelect.innerHTML = '';
    for (let y = maxYear; y >= minYear; y--) {
      calYearSelect.insertAdjacentHTML('beforeend', `<option value="${y}">${y}년</option>`);
    }
    calMonthSelect.innerHTML = '';
    for (let m = 1; m <= 12; m++) {
      calMonthSelect.insertAdjacentHTML('beforeend', `<option value="${m}">${m}월</option>`);
    }
  }

  function openCalendarPicker() {
    populateCalendarPickerOptions();
    calYearSelect.value = String(calendarYear);
    calMonthSelect.value = String(calendarMonth);
    calendarPicker.classList.add('open');
  }

  calendarLabel.addEventListener('click', () => {
    if (calendarPicker.classList.contains('open')) closeCalendarPicker();
    else openCalendarPicker();
  });

  calYearSelect.addEventListener('change', () => {
    calendarYear = parseInt(calYearSelect.value, 10);
    renderCalendar();
    closeCalendarPicker();
  });

  calMonthSelect.addEventListener('change', () => {
    calendarMonth = parseInt(calMonthSelect.value, 10);
    renderCalendar();
    closeCalendarPicker();
  });

  function openAddForDate(iso) {
    editingDayId = null;
    sheetTitle.textContent = '기록 추가';
    dateInput.value = iso;
    formExercises = [emptyExerciseRow()];
    renderExerciseRows();
    openOverlay(overlay);
  }

  function renderCalendar() {
    ensureCalendarPosition();
    calendarLabel.textContent = `${calendarYear}년 ${calendarMonth}월`;

    const byDate = new Map(days.map((d) => [d.date, d]));
    const firstOfMonth = new Date(calendarYear, calendarMonth - 1, 1);
    const startWeekday = firstOfMonth.getDay();
    const daysInMonth = new Date(calendarYear, calendarMonth, 0).getDate();
    const todayStr = todayISO();

    let cells = '';
    for (let i = 0; i < startWeekday; i++) {
      cells += `<div class="cal-cell empty"></div>`;
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const iso = `${calendarYear}-${String(calendarMonth).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      const hasLog = byDate.has(iso);
      const isToday = iso === todayStr;
      cells += `
        <button type="button" class="cal-cell${hasLog ? ' has-log' : ''}${isToday ? ' today' : ''}" data-date="${iso}">
          <span>${d}</span>
          ${hasLog ? '<span class="cal-dot"></span>' : ''}
        </button>`;
    }

    calendarGrid.innerHTML = `
      <div class="cal-weekdays">${WEEKDAYS_KO.map((w) => `<span>${w}</span>`).join('')}</div>
      <div class="cal-days">${cells}</div>
    `;

    calendarGrid.querySelectorAll('.cal-cell[data-date]').forEach((cell) => {
      cell.addEventListener('click', () => {
        const iso = cell.getAttribute('data-date');
        const day = byDate.get(iso);
        if (day) openEdit(day.id);
        else openAddForDate(iso);
      });
    });
  }

  calPrevBtn.addEventListener('click', () => {
    ensureCalendarPosition();
    closeCalendarPicker();
    calendarMonth--;
    if (calendarMonth < 1) { calendarMonth = 12; calendarYear--; }
    renderCalendar();
  });
  calNextBtn.addEventListener('click', () => {
    ensureCalendarPosition();
    closeCalendarPicker();
    calendarMonth++;
    if (calendarMonth > 12) { calendarMonth = 1; calendarYear++; }
    renderCalendar();
  });

  let selectionMode = false;
  let selectedIds = new Set();
  let pendingConfirmAction = null;

  // iOS lets touches scroll the page behind a fixed-position sheet unless the
  // body itself is pinned. Lock/unlock based on whether any modal overlay is open.
  let bodyScrollLocked = false;
  let savedScrollY = 0;

  function syncBodyScrollLock() {
    const anyOpen = !!document.querySelector('.overlay.open');
    if (anyOpen && !bodyScrollLocked) {
      bodyScrollLocked = true;
      savedScrollY = window.scrollY;
      document.body.style.position = 'fixed';
      document.body.style.top = `-${savedScrollY}px`;
      document.body.style.left = '0';
      document.body.style.right = '0';
    } else if (!anyOpen && bodyScrollLocked) {
      bodyScrollLocked = false;
      document.body.style.position = '';
      document.body.style.top = '';
      document.body.style.left = '';
      document.body.style.right = '';
      window.scrollTo(0, savedScrollY);
    }
  }

  function openOverlay(el) {
    el.classList.add('open');
    syncBodyScrollLock();
  }

  function closeOverlay(el) {
    el.classList.remove('open');
    syncBodyScrollLock();
  }

  function openConfirm(title, message, onConfirm) {
    confirmTitle.textContent = title;
    confirmMessage.textContent = message;
    pendingConfirmAction = onConfirm;
    openOverlay(confirmOverlay);
  }

  function closeConfirm() {
    closeOverlay(confirmOverlay);
    pendingConfirmAction = null;
  }

  confirmCancelBtn.addEventListener('click', closeConfirm);
  confirmOverlay.addEventListener('click', (e) => {
    if (e.target === confirmOverlay) closeConfirm();
  });
  confirmOkBtn.addEventListener('click', () => {
    const action = pendingConfirmAction;
    closeConfirm();
    if (action) action();
  });

  function updateSelectionBar() {
    selectionCount.textContent = `${selectedIds.size}개 선택`;
    deleteSelectedBtn.disabled = selectedIds.size === 0;
  }

  function enterSelectionMode() {
    selectionMode = true;
    selectedIds = new Set();
    selectionBar.classList.add('open');
    fabAdd.style.display = 'none';
    render();
  }

  function exitSelectionMode() {
    selectionMode = false;
    selectedIds = new Set();
    selectionBar.classList.remove('open');
    fabAdd.style.display = '';
    render();
  }

  selectModeBtn.addEventListener('click', () => {
    if (selectionMode) exitSelectionMode();
    else enterSelectionMode();
  });
  selectCancelBtn.addEventListener('click', exitSelectionMode);

  selectAllBtn.addEventListener('click', () => {
    const visible = getVisibleDays();
    if (selectedIds.size === visible.length) {
      selectedIds = new Set();
    } else {
      selectedIds = new Set(visible.map((d) => d.id));
    }
    render();
  });

  deleteSelectedBtn.addEventListener('click', () => {
    if (selectedIds.size === 0) return;
    openConfirm(
      '선택한 기록 삭제',
      `선택한 ${selectedIds.size}일 기록을 삭제할까요? 되돌릴 수 없습니다.`,
      () => {
        days = days.filter((d) => !selectedIds.has(d.id));
        saveDays(days);
        pushToCloud();
        exitSelectionMode();
      }
    );
  });

  deleteAllBtn.addEventListener('click', () => {
    const visible = getVisibleDays();
    if (visible.length === 0) return;
    const scopeLabel = activeYearFilter === 'all' ? '전체' : `${activeYearFilter}년`;
    openConfirm(
      '전체 삭제',
      `${scopeLabel} ${visible.length}일 기록을 모두 삭제할까요? 되돌릴 수 없습니다.`,
      () => {
        const visibleIds = new Set(visible.map((d) => d.id));
        days = days.filter((d) => !visibleIds.has(d.id));
        saveDays(days);
        pushToCloud();
        exitSelectionMode();
      }
    );
  });

  function setSyncStatus(text, isError) {
    syncStatus.textContent = text;
    syncStatus.className = 'sync-status ' + (isError ? 'err' : 'ok');
  }

  function subscribeSync() {
    if (unsubscribeSync) unsubscribeSync();
    setSyncStatus('동기화 연결 중...', false);
    unsubscribeSync = db.collection('logs').doc(syncCode).onSnapshot((snap) => {
      setSyncStatus('동기화 됨', false);
      if (!snap.exists) return;
      const data = snap.data();
      if (Array.isArray(data.days)) {
        applyingRemote = true;
        days = data.days;
        saveDays(days);
        refreshCurrentView();
        applyingRemote = false;
      }
    }, (err) => {
      console.error('sync error', err);
      setSyncStatus('동기화 실패 (오프라인이거나 권한 설정 필요)', true);
    });
  }

  function pushToCloud() {
    if (applyingRemote) return;
    db.collection('logs').doc(syncCode)
      .set({ days, updatedAt: firebase.firestore.FieldValue.serverTimestamp() })
      .catch((e) => {
        console.error('push failed', e);
        setSyncStatus('동기화 실패 (오프라인이거나 권한 설정 필요)', true);
      });
  }

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function getAvailableYears() {
    const years = new Set(days.map((d) => d.date.slice(0, 4)));
    return Array.from(years).sort((a, b) => b.localeCompare(a));
  }

  function getVisibleDays() {
    let visible = activeYearFilter === 'all' ? days : days.filter((d) => d.date.slice(0, 4) === activeYearFilter);
    if (searchQuery) visible = visible.filter((d) => matchesSearch(d, searchQuery));
    return visible;
  }

  function renderYearTabs() {
    const years = getAvailableYears();
    if (years.length <= 1) {
      yearTabsEl.classList.remove('open');
      yearTabsEl.innerHTML = '';
      if (activeYearFilter !== 'all') activeYearFilter = 'all';
      return;
    }
    if (activeYearFilter !== 'all' && !years.includes(activeYearFilter)) activeYearFilter = 'all';

    yearTabsEl.classList.add('open');
    const tabs = ['all', ...years];
    yearTabsEl.innerHTML = tabs.map((y) => `
      <button class="year-tab ${activeYearFilter === y ? 'active' : ''}" data-year="${y}" type="button">${y === 'all' ? '전체' : y + '년'}</button>
    `).join('');
    yearTabsEl.querySelectorAll('[data-year]').forEach((btn) => {
      btn.addEventListener('click', () => {
        activeYearFilter = btn.getAttribute('data-year');
        render();
      });
    });
  }

  function matchesSearch(day, query) {
    const compactQuery = query.replace(/\s+/g, '');
    if (!compactQuery) return true;
    const { label } = formatDateShort(day.date); // e.g. "25/10/14"
    if (day.date.includes(compactQuery) || label.includes(compactQuery)) return true;
    return day.exercises.some((ex) => ex.name.replace(/\s+/g, '').includes(compactQuery));
  }

  function render() {
    renderYearTabs();
    const sorted = [...getVisibleDays()].sort((a, b) => {
      if (a.date === b.date) return 0;
      const newestFirst = a.date < b.date ? 1 : -1;
      return sortAscending ? -newestFirst : newestFirst;
    });
    dayCountEl.textContent = sorted.length ? `총 ${sorted.length}일` : '';

    if (sorted.length === 0) {
      listRoot.innerHTML = searchQuery
        ? `
        <div class="empty-state">
          <div>검색 결과가 없어요.</div>
        </div>`
        : `
        <div class="empty-state">
          <div>아직 기록이 없어요.</div>
          <div>+ 버튼을 눌러 첫 기록을 남겨보세요.</div>
        </div>`;
      return;
    }

    listRoot.innerHTML = `<div class="day-list">${sorted.map((d) => dayCardHtml(d)).join('')}</div>`;

    if (selectionMode) {
      updateSelectionBar();
      listRoot.querySelectorAll('[data-select]').forEach((cb) => {
        cb.addEventListener('change', () => {
          const id = cb.getAttribute('data-select');
          if (cb.checked) selectedIds.add(id);
          else selectedIds.delete(id);
          render();
        });
      });
      listRoot.querySelectorAll('.day-card.selectable').forEach((card) => {
        card.addEventListener('click', (e) => {
          if (e.target.matches('input[data-select]')) return;
          const cb = card.querySelector('input[data-select]');
          cb.checked = !cb.checked;
          cb.dispatchEvent(new Event('change'));
        });
      });
    } else {
      listRoot.querySelectorAll('[data-edit]').forEach((btn) => {
        btn.addEventListener('click', () => openEdit(btn.getAttribute('data-edit')));
      });
      listRoot.querySelectorAll('[data-delete]').forEach((btn) => {
        btn.addEventListener('click', () => deleteDay(btn.getAttribute('data-delete')));
      });
    }
  }

  function dayCardHtml(day) {
    const { label, weekday } = formatDateShort(day.date);
    const exercisesHtml = day.exercises.map((ex, i) => `
      <div class="exercise">
        <p class="exercise-name"><span class="exercise-idx">${i + 1}.</span>${escapeHtml(ex.name)}</p>
        ${ex.warmup ? `<div class="exercise-line"><b>웜업</b> - ${escapeHtml(ex.warmup)}</div>` : ''}
        ${ex.main ? `<div class="exercise-line"><b>본셋</b> - ${escapeHtml(ex.main)}</div>` : ''}
      </div>
    `).join('');

    const actionsHtml = selectionMode
      ? `<input type="checkbox" class="select-checkbox" data-select="${day.id}" ${selectedIds.has(day.id) ? 'checked' : ''}>`
      : `<div class="day-actions">
          <button class="icon-btn" data-edit="${day.id}">수정</button>
          <button class="icon-btn danger" data-delete="${day.id}">삭제</button>
        </div>`;

    return `
      <div class="day-card ${selectionMode ? 'selectable' : ''} ${selectedIds.has(day.id) ? 'selected' : ''}">
        <div class="day-header">
          <div class="day-date">
            <span class="day-date-num">${label}</span>
            <span class="day-weekday">${weekday}</span>
          </div>
          ${actionsHtml}
        </div>
        ${exercisesHtml}
      </div>
    `;
  }

  function deleteDay(id) {
    days = days.filter((d) => d.id !== id);
    saveDays(days);
    refreshCurrentView();
    pushToCloud();
  }

  function emptyExerciseRow() {
    return { id: uid(), name: '', warmup: '', main: '' };
  }

  let formExercises = [];

  // Unique exercise names from saved history, most-used first — feeds the autocomplete.
  function getAllExerciseNames() {
    const counts = new Map();
    for (const d of days) {
      for (const ex of d.exercises) {
        const n = ex.name.trim();
        if (!n) continue;
        counts.set(n, (counts.get(n) || 0) + 1);
      }
    }
    return Array.from(counts.entries()).sort((a, b) => b[1] - a[1]).map((e) => e[0]);
  }

  function attachNameAutocomplete(block, rowId) {
    const nameInput = block.querySelector('input[data-field="name"]');
    const suggestBox = block.querySelector('.suggest-box');

    function hideSuggestions() {
      suggestBox.classList.remove('open');
      suggestBox.innerHTML = '';
    }

    function refreshSuggestions() {
      const value = nameInput.value.trim();
      if (!value) { hideSuggestions(); return; }
      const compact = value.replace(/\s+/g, '');
      const matches = getAllExerciseNames()
        .filter((n) => n !== value && n.replace(/\s+/g, '').includes(compact))
        .slice(0, 6);
      if (matches.length === 0) { hideSuggestions(); return; }
      suggestBox.innerHTML = matches.map((n) => `<button type="button" class="suggest-item">${escapeHtml(n)}</button>`).join('');
      suggestBox.classList.add('open');
      suggestBox.querySelectorAll('.suggest-item').forEach((btn) => {
        // Plain click (fires on release, not on initial touch) — the blur delay
        // below keeps the box mounted long enough for the click to land.
        btn.addEventListener('click', () => {
          nameInput.value = btn.textContent;
          const row = formExercises.find((r) => r.id === rowId);
          if (row) row.name = btn.textContent;
          hideSuggestions();
        });
      });
    }

    nameInput.addEventListener('input', refreshSuggestions);
    nameInput.addEventListener('focus', refreshSuggestions);
    nameInput.addEventListener('blur', () => setTimeout(hideSuggestions, 250));
  }

  function renderExerciseRows() {
    exerciseRows.innerHTML = formExercises.map((ex, i) => `
      <div class="exercise-block" data-row="${ex.id}">
        <div class="exercise-row-head">
          <span class="exercise-idx">${i + 1}.</span>
          <div class="name-wrap">
            <input type="text" data-field="name" placeholder="운동 이름 (예: 벤치 프레스)" value="${escapeHtml(ex.name)}" autocomplete="off">
            <div class="suggest-box"></div>
          </div>
          ${formExercises.length > 1 ? `<button type="button" class="remove-btn" data-remove="${ex.id}">×</button>` : ''}
        </div>
        <input type="text" class="mono" data-field="warmup" placeholder="웜업 - 예: 20x12 / 40x8" value="${escapeHtml(ex.warmup)}">
        <input type="text" class="mono" data-field="main" placeholder="본셋 - 예: 50x3x10,10,10" value="${escapeHtml(ex.main)}">
      </div>
    `).join('');

    exerciseRows.querySelectorAll('[data-row]').forEach((block) => {
      const id = block.getAttribute('data-row');
      block.querySelectorAll('input[data-field]').forEach((inp) => {
        inp.addEventListener('input', () => {
          const field = inp.getAttribute('data-field');
          const row = formExercises.find((e) => e.id === id);
          if (row) row[field] = inp.value;
        });
      });
      attachNameAutocomplete(block, id);
    });
    exerciseRows.querySelectorAll('[data-remove]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-remove');
        formExercises = formExercises.filter((e) => e.id !== id);
        renderExerciseRows();
      });
    });
  }

  function openAdd() {
    editingDayId = null;
    sheetTitle.textContent = '기록 추가';
    dateInput.value = todayISO();
    formExercises = [emptyExerciseRow()];
    renderExerciseRows();
    openOverlay(overlay);
  }

  function openEdit(id) {
    const day = days.find((d) => d.id === id);
    if (!day) return;
    editingDayId = id;
    sheetTitle.textContent = '기록 수정';
    dateInput.value = day.date;
    formExercises = day.exercises.length
      ? day.exercises.map((e) => ({ ...e }))
      : [emptyExerciseRow()];
    renderExerciseRows();
    openOverlay(overlay);
  }

  function closeSheet() {
    closeOverlay(overlay);
  }

  function saveSheet() {
    const valid = formExercises
      .map((e) => ({ ...e, name: e.name.trim(), warmup: e.warmup.trim(), main: e.main.trim() }))
      .filter((e) => e.name.length > 0);
    if (valid.length === 0) return;

    const date = parseDateInput(dateInput.value);
    if (editingDayId) {
      days = days.map((d) => (d.id === editingDayId ? { ...d, date, exercises: valid } : d));
    } else {
      days = [{ id: uid(), date, exercises: valid }, ...days];
    }
    saveDays(days);
    closeSheet();
    refreshCurrentView();
    pushToCloud();
  }

  function openSync() {
    syncCodeDisplay.textContent = syncCode;
    joinCodeInput.value = '';
    setSyncStatus('', false);
    openOverlay(syncOverlay);
  }

  function closeSync() {
    closeOverlay(syncOverlay);
  }

  function openImport() {
    importTextarea.value = '';
    importStatus.textContent = '';
    openOverlay(importOverlay);
  }

  function closeImport() {
    closeOverlay(importOverlay);
  }

  importBtn.addEventListener('click', openImport);
  importCloseBtn.addEventListener('click', closeImport);
  importOverlay.addEventListener('click', (e) => {
    if (e.target === importOverlay) closeImport();
  });

  importConfirmBtn.addEventListener('click', () => {
    const parsed = parseNotepadImport(importTextarea.value);
    if (parsed.length === 0) {
      importStatus.className = 'sync-status err';
      importStatus.textContent = '인식된 기록이 없어요. 형식을 확인해주세요.';
      return;
    }
    const byDate = new Map(days.map((d) => [d.date, d]));
    for (const d of parsed) byDate.set(d.date, d);
    days = Array.from(byDate.values());
    saveDays(days);
    refreshCurrentView();
    pushToCloud();
    importStatus.className = 'sync-status ok';
    importStatus.textContent = `${parsed.length}일치 기록을 가져왔습니다.`;
    setTimeout(closeImport, 900);
  });

  syncBtn.addEventListener('click', openSync);
  syncCloseBtn.addEventListener('click', closeSync);
  syncOverlay.addEventListener('click', (e) => {
    if (e.target === syncOverlay) closeSync();
  });

  copyCodeBtn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(syncCode);
      copyCodeBtn.textContent = '복사됨';
      setTimeout(() => { copyCodeBtn.textContent = '복사'; }, 1500);
    } catch (e) {
      /* clipboard unavailable; user can select the text manually */
    }
  });

  joinCodeBtn.addEventListener('click', () => {
    const raw = joinCodeInput.value.trim().toUpperCase();
    if (raw.length < 6) return;
    syncCode = raw;
    localStorage.setItem(SYNC_KEY, syncCode);
    syncCodeDisplay.textContent = syncCode;
    subscribeSync();
  });

  document.getElementById('fabAdd').addEventListener('click', openAdd);
  document.getElementById('cancelBtn').addEventListener('click', closeSheet);
  document.getElementById('saveBtn').addEventListener('click', saveSheet);
  document.getElementById('addExerciseBtn').addEventListener('click', () => {
    formExercises.push(emptyExerciseRow());
    renderExerciseRows();
  });
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeSheet();
  });

  render();
  subscribeSync();

  // Generate a simple barbell glyph as the home-screen icon (apple-touch-icon needs a raster image).
  (function drawAppIcon() {
    const size = 180;
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');

    const styles = getComputedStyle(document.documentElement);
    const bg = styles.getPropertyValue('--bg').trim() || '#1A1712';
    const accent = styles.getPropertyValue('--accent').trim() || '#E2793D';

    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, size, size);

    ctx.strokeStyle = accent;
    ctx.lineCap = 'round';

    const midY = size / 2;
    ctx.lineWidth = 10;
    ctx.beginPath();
    ctx.moveTo(40, midY);
    ctx.lineTo(140, midY);
    ctx.stroke();

    ctx.fillStyle = accent;
    function plate(cx, w, h) {
      ctx.beginPath();
      ctx.roundRect(cx - w / 2, midY - h / 2, w, h, 6);
      ctx.fill();
    }
    plate(34, 20, 84);
    plate(146, 20, 84);
    plate(50, 14, 60);
    plate(130, 14, 60);

    document.getElementById('apple-icon').setAttribute('href', canvas.toDataURL('image/png'));
  })();
</script>
